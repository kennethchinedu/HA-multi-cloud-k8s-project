---
# 1. Require liveness and readiness probes on all containers in the default namespace
apiVersion: kyverno.io/v1
kind: Policy
metadata:
  name: require-probes
  namespace: default
  annotations:
    policies.kyverno.io/title: Require Liveness and Readiness Probes
    policies.kyverno.io/category: Reliability
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Without probes, Kubernetes cannot detect unhealthy containers or
      hold traffic until a container is ready. Both livenessProbe and
      readinessProbe must be defined on every container.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: check-liveness-probe
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "All containers must define a livenessProbe."
        pattern:
          spec:
            containers:
              - (name): "*"
                livenessProbe:
                  (tcpSocket | httpGet | exec): "?*"
    - name: check-readiness-probe
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "All containers must define a readinessProbe."
        pattern:
          spec:
            containers:
              - (name): "*"
                readinessProbe:
                  (tcpSocket | httpGet | exec): "?*"

---
# 2. Disallow NodePort and LoadBalancer services — all traffic must go through the Istio ingress gateway
apiVersion: kyverno.io/v1
kind: Policy
metadata:
  name: restrict-service-types
  namespace: default
  annotations:
    policies.kyverno.io/title: Restrict Service Types
    policies.kyverno.io/category: Networking
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Exposing services directly via NodePort or LoadBalancer bypasses
      the Istio ingress gateway and any attached traffic policies.
      All external traffic must enter through the gateway. Only
      ClusterIP services are allowed in the default namespace.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: check-service-type
      match:
        any:
          - resources:
              kinds:
                - Service
      validate:
        message: "Only ClusterIP services are allowed in the default namespace. Use the Istio ingress gateway for external access."
        pattern:
          spec:
            type: ClusterIP | "?*"

---
# 3. Require a securityContext to be defined at the pod level
apiVersion: kyverno.io/v1
kind: Policy
metadata:
  name: require-pod-security-context
  namespace: default
  annotations:
    policies.kyverno.io/title: Require Pod Security Context
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      A pod-level securityContext sets a security baseline for all
      containers in the pod. Requiring it ensures teams consciously
      define the security posture of their workloads rather than
      relying on insecure defaults.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: check-pod-security-context
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Pods must define a securityContext at the pod level."
        pattern:
          spec:
            securityContext:
              (runAsNonRoot | runAsUser | fsGroup): "?*"
