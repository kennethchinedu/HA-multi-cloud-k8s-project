vault:
  server:
    dev:
      enabled: true
      devRootToken: "root"

    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "500m"

    service:
      type: NodePort
      nodePort: 32200

  injector:
    enabled: true

    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "250m"

  ui:
    enabled: true
    serviceType: NodePort
    serviceNodePort: 32100
